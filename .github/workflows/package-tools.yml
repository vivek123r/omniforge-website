name: Package and Release Tools

on:
  push:
    paths:
      - 'tools/**'
      - 'scripts/**'
      - '.github/workflows/package-tools.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Fetch last 2 commits to perform diff comparisons against HEAD~1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Package Tools and Generate Registry
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Workflow manually triggered. Packaging all tools..."
            python scripts/package_tools.py
          else
            echo "Push triggered. Detecting changed tools..."
            # Get unique directories under tools/ that have changes
            changed_folders=$(git diff --name-only HEAD~1 | grep '^tools/' | cut -d/ -f2 | sort -u)
            
            if [ -z "$changed_folders" ]; then
              echo "No files changed inside tools/ folder."
              mkdir -p dist_tools
              touch dist_tools/release_packages.txt
            else
              echo "Changes detected in: $changed_folders"
              # Convert newline separated list to spaces
              build_args=$(echo "$changed_folders" | tr '\n' ' ')
              python scripts/package_tools.py $build_args
            fi
          fi

      - name: Commit and Push registry index
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff-index --quiet HEAD || git commit -m "chore: auto-update toolbox index.json [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Create Releases and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f dist_tools/release_packages.txt ]; then
            echo "Ensuring latest-tools release exists..."
            gh release create "latest-tools" \
              -R "$GITHUB_REPOSITORY" \
              --title "OmniForge Community Tools (Latest)" \
              --notes "Consolidated release for all OmniForge community tools." \
              || true

            while IFS=, read -r tool_id version zip_path || [ -n "$tool_id" ]; do
              # Ensure line is not empty
              [ -z "$tool_id" ] && continue
              echo "Uploading ${zip_path} to latest-tools release..."
              if ! gh release upload "latest-tools" "$zip_path" \
                -R "$GITHUB_REPOSITORY" \
                --clobber > release_error.log 2>&1; then
                echo "Asset upload failed for $zip_path. Log:"
                cat release_error.log
                git config --global user.name "github-actions[bot]"
                git config --global user.email "github-actions[bot]@users.noreply.github.com"
                git add release_error.log
                git commit -m "chore: log upload error for $zip_path [skip ci]" || true
                git push origin HEAD:${{ github.ref_name }} || true
                exit 1
              fi
            done < dist_tools/release_packages.txt
          else
            echo "No packages list found to release."
          fi
